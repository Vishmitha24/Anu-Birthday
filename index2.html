<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anu 💗</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9ad5, #c77dff);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  position: sticky;
  top: 0;
  z-index: 10;
}

.hero {
  padding: 40px 20px;
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 16px;
  max-width: 500px;
  margin: auto;
}

.card {
  margin: 20px auto;
  padding: 20px;
  max-width: 500px;
  background: rgba(0,0,0,0.25);
  border-radius: 20px;
  backdrop-filter: blur(8px);
  white-space: pre-line;
}

ul {
  list-style: none;
  padding: 0;
}

ul li {
  margin: 8px 0;
  font-size: 15px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #c77dff;
  font-weight: bold;
  cursor: pointer;
}

footer {
  margin-top: 30px;
  padding: 15px;
  background: rgba(0,0,0,0.2);
  font-size: 14px;
}

/* Typing effect */
#text {
  font-family: monospace;
  font-size: 15px;
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 6px;
  background-color: white;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% {opacity:1;}
  50% {opacity:0;}
}

/* Floating hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 18px;
  animation: float 5s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  0% { transform: translateY(0) scale(1); opacity: 0.8; }
  100% { transform: translateY(-100vh) scale(1.3); opacity: 0; }
}
</style>
</head>
<body>

<header>
💖 A Special Page Just For Anu 💖
</header>

<section class="hero">
  <h1>Happy Birthday Anu 🎂</h1>
  <p>Some people enter life quietly and become someone important. You are that kind of person.</p>
</section>

<div class="card">
  <div id="text"></div><span class="cursor"></span>
  <button onclick="showExtra()">Click for a Little Extra Message 💌</button>
  <p id="extra" style="display:none; margin-top:15px;">
    No matter what happens in life,<br>
    there will always be someone quietly caring for you.<br><br>
    With love and comfort,<br>
    <b>From Sheha 💗</b>
  </p>
</div>

<footer>
Made with genuine feelings 🤍
</footer>

<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const message = `💖 Loading Something Special...

----------------------------------------
        🎂 HAPPY BIRTHDAY ANU 🎂
----------------------------------------

Dear Anu,

Some people enter life
and stay just as a memory.

But some…
become a feeling.

You became a feeling.

Comfort.
Warmth.
A calm happiness I didn’t expect.

On your birthday,
I don’t just wish you success or smiles.

I wish you a life
where you are deeply loved,
truly understood,
and never feel alone.

✔ May your heart always stay soft
✔ May your smile never fade
✔ May your dreams chase you back
✔ And may you always feel how special you are

I’m really grateful I met you.
More than you probably know.
`;

let i = 0;
const speed = 40; // slower for smooth mobile typing
const textElement = document.getElementById("text");

function typeWriter() {
  if (i < message.length) {
    textElement.innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}

function showExtra() {
  document.getElementById("extra").style.display = "block";
}

window.onload = () => {
  typeWriter();
  setInterval(createHeart, 700); // fewer hearts for smoother mobile performance
  document.getElementById("bgMusic").play().catch(()=>{}); // tap if blocked
};
</script>

</body>
</html>
